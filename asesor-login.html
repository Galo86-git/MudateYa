<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Accediendo… — MudateYa Asesores</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style data-cfasync="false">
  :root{
    --navy:#003580;--green:#22C36A;
    --text:#0F1923;--text2:#475569;--text3:#94A3B8;
    --border:#E2E8F0;--bg:#F5F7FA;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}

  .card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:48px 32px;text-align:center;max-width:420px;width:100%;box-shadow:0 8px 24px rgba(15,25,35,.06)}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--navy);margin-bottom:28px;display:block;text-decoration:none}
  .logo span{color:var(--green)}
  .state{font-size:16px;color:var(--text2);line-height:1.6;margin-bottom:18px}
  .state strong{color:var(--text)}

  .loader{display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:18px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .icon-ok{font-size:48px;margin-bottom:14px;color:var(--green)}
  .icon-err{font-size:48px;margin-bottom:14px;color:#EF4444}

  .btn{display:inline-block;margin-top:14px;padding:12px 22px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;font-family:'Inter',sans-serif}
  .btn:hover{background:#1AA558}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text2)}
  .btn-secondary:hover{background:var(--bg);color:var(--text)}

  .hint{font-size:12px;color:var(--text3);margin-top:18px;font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="card" id="card">
  <a href="/" class="logo">MUDATE<span>YA</span></a>
  <div id="content">
    <div class="loader"></div>
    <div class="state">Verificando tu link de acceso…</div>
  </div>
</div>

<script data-cfasync="false">
function getParam(name) {
  var m = new RegExp('[?&]' + name + '=([^&]+)').exec(location.search);
  return m ? decodeURIComponent(m[1]) : null;
}

function render(kind, title, msg, extra) {
  var content = document.getElementById('content');
  if (kind === 'ok') {
    content.innerHTML =
      '<div class="icon-ok">✓</div>' +
      '<div class="state"><strong>' + title + '</strong><br/>' + msg + '</div>' +
      (extra || '');
  } else if (kind === 'err') {
    content.innerHTML =
      '<div class="icon-err">✗</div>' +
      '<div class="state"><strong>' + title + '</strong><br/>' + msg + '</div>' +
      (extra || '');
  } else {
    content.innerHTML = '<div class="loader"></div><div class="state">' + msg + '</div>';
  }
}

async function init() {
  var token = getParam('token');
  if (!token) {
    render('err',
      'Link inválido',
      'El link no tiene un token de acceso válido. Probá solicitarlo de nuevo desde la página de asesores.',
      '<a href="/asesores" class="btn">Ir a /asesores</a>'
    );
    return;
  }

  try {
    var r = await fetch('/api/asesores?action=verify-magiclink&token=' + encodeURIComponent(token));
    var d = await r.json();
    if (!r.ok || !d.ok) {
      throw new Error(d.error || 'Link expirado o inválido');
    }
    // Guardamos la sesión
    localStorage.setItem('asesorToken', d.sessionToken);
    render('ok',
      '¡Todo listo!',
      'Te llevamos a tu panel…'
    );
    setTimeout(function(){ location.replace('/asesor-dashboard'); }, 700);
  } catch(e) {
    render('err',
      'No pudimos verificarte',
      (e.message || 'El link expiró o ya fue usado.') + ' Pedí otro desde la página de asesores.',
      '<a href="/asesores" class="btn">Volver a /asesores</a>'
    );
  }
}

init();
</script>

</body>
</html>
